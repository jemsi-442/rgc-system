<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5e0d0d">
    <title>RGC Platform Offline</title>
    <style>
        :root {
            color-scheme: light;
            --rgc-red: #5e0d0d;
            --rgc-gold: #f7d86c;
            --rgc-cream: #f7ecd0;
            --rgc-text: #1c1717;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: Poppins, system-ui, sans-serif;
            color: var(--rgc-text);
            background:
                radial-gradient(circle at top left, rgba(255, 215, 0, 0.26), transparent 24%),
                linear-gradient(180deg, #fff8df 0%, #fffdf7 36%, #f4efe6 100%);
        }

        .offline-card {
            width: min(100%, 36rem);
            border-radius: 1.75rem;
            border: 1px solid rgba(143, 17, 17, 0.12);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 54px rgba(77, 15, 15, 0.12);
            padding: 2rem 1.4rem;
            text-align: center;
        }

        .offline-mark {
            width: 4.5rem;
            height: 4.5rem;
            margin: 0 auto 1rem;
            border-radius: 1.4rem;
            background: linear-gradient(135deg, var(--rgc-red), #c00000);
            color: white;
            display: grid;
            place-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            box-shadow: 0 16px 30px rgba(143, 17, 17, 0.22);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.7rem, 5vw, 2.4rem);
            line-height: 1.05;
        }

        p {
            margin: 0.65rem 0;
            line-height: 1.65;
            color: rgba(28, 23, 23, 0.78);
        }

        .offline-actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .offline-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            padding: 0.9rem 1.3rem;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid rgba(143, 17, 17, 0.14);
        }

        .offline-button--primary {
            background: linear-gradient(135deg, var(--rgc-red), #c00000);
            color: #fff;
            box-shadow: 0 14px 28px rgba(143, 17, 17, 0.2);
        }

        .offline-button--secondary {
            background: var(--rgc-cream);
            color: var(--rgc-text);
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <div class="offline-mark">RGC</div>
        <h1>Hakuna mtandao kwa sasa</h1>
        <p>Mfumo wa RGC umefunguka katika hali ya offline. Jaribu tena ukirudi kwenye internet ili upate taarifa mpya.</p>
        <p>Kurasa zilizotembelewa tayari na assets za msingi zinaweza kuendelea kufunguka hata connection ikiwa dhaifu kwa muda.</p>
        <div class="offline-actions">
            <a class="offline-button offline-button--primary" href="/">Jaribu tena</a>
            <a class="offline-button offline-button--secondary" href="/login">Fungua login</a>
        </div>
    </main>
</body>
</html>
